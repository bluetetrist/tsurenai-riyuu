<!doctype html><html><head></head><body><!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>今釣れない理由</title>

	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			background: #000;
			color: #fff;
			font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
		}

		#app {
			width: 90%;
			max-width: 520px;
			text-align: center;
		}

		h1 {
			font-weight: 300;
			font-size: 2rem;
			margin-bottom: 60px;
		}

		.colors {
			display: flex;
			justify-content: center;
			gap: 30px;
		}

		.color-btn {
			width: 70px;
			height: 70px;
			border-radius: 50%;
			border: none;
			cursor: pointer;
		}

		.red {
			background: #c0392b;
		}

		.blue {
			background: #2980b9;
		}

		.green {
			background: #27ae60;
		}

		.message {
			font-size: 1.8rem;
			line-height: 1.8;
			margin: 40px 0;
		}

		.action {
			display: inline-block;
			margin: 10px;
			padding: 12px 22px;
			background: none;
			border: 1px solid #666;
			border-radius: 8px;
			color: #fff;
			cursor: pointer;
		}

		.action:hover {
			border-color: #fff;
		}

		.goodluck {
			margin-top: 40px;
			font-size: 2rem;
			letter-spacing: 2px;
		}

		.close {
			margin-top: 35px;
			color: #888;
			cursor: pointer;
			font-size: 0.95rem;
		}

		.close:hover {
			color: #fff;
		}
	</style>
</head>

<body>

	<div id="app"></div>

	<script>
		const messages = [

    // 王道
    "魚がおらん",
    "群れが入ってへんみたいやね",
    "潮が動いてへん",
    "潮が速すぎるんかも",
    "潮が緩すぎるんかも",
    "水が澄みすぎやね",
    "水が濁りすぎかな",
    "波が足りへん",
    "波が高すぎる",
    "風が強いね",
    "ベイトがおらん",
    "エサが合ってへんかも",
    "針が大きいんちゃう？",
    "針が小さいんちゃう？",
    "動かしすぎやね",
    "動かさなすぎやね",
    "飛距離が足りへん",
    "飛ばしすぎかも",
    "そこにはおらん",

    // 時間
    "あと5分待ってみる？",
    "あと10分かな",
    "次の潮待ちやね",
    "今じゃない気がする",
    "夕方まで待ってみる？",
    "1時間待ってみる？",
    "朝なら良かったかも",
    "明日にしろってことかも",
    "来週また来て",
    "帰るにはまだ早いかも",

    // 気を持たせる
    "惜しいところまでは来てるよ",
    "さっきのは悪くなかった",
    "一回だけ近くまで来てた",
    "今日はまだ終わってへんよ",
    "次はあるかも",
    "今はおらんけど、また来るかも",
    "もう少し右かもしれへんな",
    "そこじゃない気がする",
    "たぶん、もうすぐ",
    "さっき通った気がする",

    // 人間観察
    "ちょっと焦ってる？",
    "力、入ってるよ",
    "考えすぎかもしれへんね",
    "今日は楽しめてる？",
    "そんなに急がんでもええのに",
    "殺気が強い",
    "期待しすぎや",
    "スマホ見すぎ",
    "まじめに釣ってないやろ",

    // 人生相談
    "野菜食べてる？",
    "寝不足やろ",
    "水飲んでる？",
    "親に電話した？",
    "家族に不義理してない？",
    "墓参りしてる？",
    "部屋が散らかっとる",
    "靴が汚れてるよ",

    // 不穏
    "誰かに恨まれてない？",
    "心当たりない？",
    "忘れてるだけちゃうかな",
    "気のせいやと思うけど",
    "まぁ、気のせいやと思う",

    // 優しい
    "君は優しすぎる",
    "ちゃんとやってると思うよ",
    "そんな日もあるやん",
    "今日は魚の方が悪いわ",
    "自分ばっかり責めたらあかんよ",

    // ポエム
    "さっき惜しかったんよ",
    "気付いてへんかった？",
    "一度だけ目が合った",
    "今の波は少し違った",
    "あと少しやったかもしれへん",
    "今日は海が考え事してる",
    "今日は縁がないね",
    "魚は見えへんだけで泳いでる",

    // 理不尽
    "君が嫌い",
    "あんた嫌われてるで",
    "理由なんかない",
    "なんとなく",
    "こっちが聞きたい",
    "昨日なら釣れた",
    "隣にはおる",
    "5分前ならおった",
    "もう帰った",

    // レア
    "今日は釣れる",
    "今投げて",
    "帰るな",
    "そのままでええ",
    "理由はないよ",
    "知らんけど"
];

let firstMessage = "";

function randomMessage(exclude=""){

    let pool = messages.filter(
        m => m !== exclude
    );

    return pool[
        Math.floor(
            Math.random() * pool.length
        )
    ];
}

function showStart(){

    app.innerHTML = `
        <h1>今釣れない理由</h1>

        <div class="colors">
            <button class="color-btn red"></button>
            <button class="color-btn blue"></button>
            <button class="color-btn green"></button>
        </div>
    `;

    document
        .querySelectorAll(".color-btn")
        .forEach(btn=>{
            btn.addEventListener(
                "click",
                showAnswer
            );
        });
}

function showAnswer(){

    firstMessage = randomMessage();

    app.innerHTML = `
        <h1>今釣れない理由</h1>

        <div class="message">
            ${firstMessage}
        </div>

        <button class="action" id="honne">
            本音を聞く
        </button>

        <button class="action" id="skip">
            聞かない
        </button>
    `;

    document
        .getElementById("honne")
        .addEventListener(
            "click",
            showHonne
        );

    document
        .getElementById("skip")
        .addEventListener(
            "click",
            showGoodLuck
        );
}

function showHonne(){

    const second =
        randomMessage(firstMessage);

    app.innerHTML = `
        <h1>本音</h1>

        <div class="message">
            ${second}
        </div>

        <div class="goodluck">
            Good Luck.
        </div>

        <div class="close" id="closeBtn">
            閉じる
        </div>
    `;

    document
        .getElementById("closeBtn")
        .addEventListener(
            "click",
            showStart
        );
}

function showGoodLuck(){

    app.innerHTML = `
        <div class="goodluck">
            Good Luck.
        </div>

        <div class="close" id="closeBtn">
            閉じる
        </div>
    `;

    document
        .getElementById("closeBtn")
        .addEventListener(
            "click",
            showStart
        );
}

showStart();

	</script>

</body>

</html></body><html>
